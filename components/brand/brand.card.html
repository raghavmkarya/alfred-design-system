<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: #fff; padding: 26px; }
  .wrap { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: var(--fw-bold);
         letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .dark { background: var(--ink-900); border-radius: var(--radius-xl); padding: 18px 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Logo, Icon } = window.AlfredAIDesignSystem_1ce241;
const LR = "../../assets/logos", IR = "../../assets/icons";
const icons = ["trend-up","budget","channel-mix","refresh","alert-warning","security-lock","web-clarity","integration-success","cta-arrow","bookmark"];
function Demo() {
  return (
    <div className="wrap">
      <div>
        <div className="lbl">Logo</div>
        <div className="row">
          <Logo variant="full" height={36} root={LR} />
          <Logo variant="mark" height={40} root={LR} />
          <div className="dark"><Logo variant="full" tone="white" height={32} root={LR} /></div>
        </div>
      </div>
      <div>
        <div className="lbl">Icons — tinted via currentColor</div>
        <div className="row" style={{gap:18}}>
          {icons.map(n => <Icon key={n} name={n} size={26} color="var(--ink-700)" root={IR} />)}
        </div>
        <div className="row" style={{gap:18, marginTop:16}}>
          {icons.map(n => <Icon key={n} name={n} size={26} color="var(--orange-500)" root={IR} />)}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
