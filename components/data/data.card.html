<!doctype html>

<style>
  body { margin: 0; background: var(--gray-50); padding: 26px; }
  .wrap { display: flex; flex-direction: column; gap: 22px; max-width: 648px; }
  .lbl { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: var(--fw-bold);

<body>
<div id="root"></div>
<script type="text/babel">
const { KpiCard, DecisionAlert, ProgressBar } = window.AlfredAIDesignSystem_1ce241;
const R = "../../assets/icons";
function Demo() {
  return (
    <div className="wrap">
      <div>
        <div className="lbl">KPI tiles</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14}}>
          <KpiCard label="Blended ROAS" value="4.8x" delta="+12.4%" direction="up" caption="vs 30d" icon="trend-up" iconRoot={R} />
          <KpiCard label="Spend" value="$312K" delta="+6.1%" direction="up" caption="pacing hot" icon="budget" iconRoot={R} />
          <KpiCard label="MQL→SQL" value="34%" delta="0.0%" direction="flat" caption="flat" icon="mql" iconRoot={R} />
        </div>
      </div>
      <div>
        <div className="lbl">Decision alerts</div>
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          <DecisionAlert priority="high" time="12m ago" iconRoot={R}
            title="Google Ads over budget"
            insight="Brand campaign exhausts its cap in 4 days. Shift $18K to Performance Max."
            action="Reallocate budget" />
          <DecisionAlert priority="opportunity" time="1h ago" iconRoot={R}
            title="LinkedIn CPL down 22%"
            insight="Efficiency is holding — Alfred recommends scaling spend +30%." />
        </div>
      </div>
      <div>
        <div className="lbl">Progress</div>
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          <ProgressBar value={72} />
          <ProgressBar value={40} tone="plain" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
