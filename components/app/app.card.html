<div id="root"></div>

      <div className="panel">

      <div className="panel">

      </div>
      <div className="row">
        <div className="panel">
          <div className="lbl">FilterBar</div>
          <FilterBar filters={[
            {type:"segmented",id:"range",options:[{value:"7d",label:"7d"},{value:"30d",label:"30d"},{value:"qtd",label:"QTD"}],value:"30d"},
            {type:"select",id:"channel",label:"Channel",options:[{value:"all",label:"All channels"},{value:"paid",label:"Paid"}],value:"all"}]} />
          <div style={{height:18}} />
          <div className="lbl">DateRangePicker</div>
          <DateRangePicker value="30d" />
        </div>
        <div className="panel">
          <div className="lbl">StatTile — KPI with inline trend</div>

      </div>

        <div className="panel p0" style={{height:300}}>
          <Sidebar active="spend" items={[
