<!-- @dsCard group="Slides" viewport="1280x720" name="Slide — Section divider" subtitle="Full-bleed brand gradient with diamond motif" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; }
  .slide { width: 1280px; height: 720px; position: relative; overflow: hidden;
    background: linear-gradient(108deg, #FF8431 0%, #FB7C4A 34%, #C99BD2 72%, #A7A7FC 100%);
    box-sizing: border-box; }
  .motif { position: absolute; inset: 0; width: 100%; height: 100%; }
  .copy { position: absolute; left: 110px; bottom: 96px; }
  .eyebrow { font-family: var(--font-sans); font-size: 16px; font-weight: 700; letter-spacing: 0.16em;
             text-transform: uppercase; color: rgba(255,255,255,0.82); margin-bottom: 14px; position: relative; }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 80px; letter-spacing: -0.02em;
           color: #fff; margin: 0; position: relative; line-height: 1; }
  .logo { position: absolute; right: 110px; top: 84px; height: 30px; }
</style>
</head>
<body>
  <div class="slide">
    <svg class="motif" viewBox="0 0 1280 720" preserveAspectRatio="none" fill="none"
         stroke="rgba(255,255,255,0.55)" stroke-width="1.5">
      <path d="M640 -40 Q640 360 1320 360" />
      <path d="M1320 360 Q640 360 640 760" />
      <path d="M640 760 Q640 360 -40 360" />
      <path d="M-40 360 Q640 360 640 -40" />
    </svg>
    <div class="copy">
      <div class="eyebrow">Section 02</div>
      <h1 class="title">Our mission</h1>
    </div>
    <img class="logo" src="../assets/logos/alfred-logo-white.svg" alt="Alfred ai" />
  </div>
</body>
</html>
