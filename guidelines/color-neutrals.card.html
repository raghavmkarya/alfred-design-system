<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Neutrals" subtitle="Text, surfaces and hairlines" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; padding: 20px; font-family: var(--font-sans); }
  .scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-lg); border: 1px solid rgba(2,2,30,0.08); }
  .name { font-size: 11px; font-weight: 700; color: var(--ink-800); }
  .hex { font-size: 11px; color: var(--ink-500); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="scale" id="s"></div>
<script>
  const steps = [
    ["Ink 900","#02021E"],["Ink 700","#323232"],["Ink 600","#505050"],["Ink 500","#6B6B78"],
    ["Ink 400","#9CA3AF"],["Gray 200","#D9D9D9"],["Gray 50","#F9F9F9"],["White","#FFFFFF"]
  ];
  document.getElementById('s').innerHTML = steps.map(([n,h])=>
    `<div class="sw"><div class="chip" style="background:${h}"></div><div class="name">${n}</div><div class="hex">${h}</div></div>`
  ).join('');
</script>
</body>
</html>
