<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base rhythm" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; padding: 24px; font-family: var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background: var(--gradient-brand); border-radius: 4px; width: 24px; }
  .n { font-size: 11px; color: var(--ink-600); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row" id="s"></div>
<script>
  const steps = [["1",4],["2",8],["3",12],["4",16],["5",20],["6",24],["8",32],["10",40],["12",48],["16",64]];
  document.getElementById('s').innerHTML = steps.map(([n,px])=>
    `<div class="col"><div class="bar" style="height:${px}px"></div><div class="n">${n}</div><div class="n" style="color:var(--ink-400)">${px}</div></div>`
  ).join('');
</script>
</body>
</html>
