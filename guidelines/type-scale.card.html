<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; padding: 22px; }
  .row { display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px solid var(--gray-100); }
  .row:last-child { border-bottom:none; }
  .spec { font-family: var(--font-sans); font-size:11px; color: var(--ink-400); width:110px; flex:none; font-variant-numeric:tabular-nums; }
  .samp { color: var(--ink-900); }
  .d { font-family: var(--font-display); font-weight:600; letter-spacing:-0.02em; }
  .s { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="row"><span class="spec">Display / 56</span><span class="samp d" style="font-size:48px">Daily CMO Briefing</span></div>
  <div class="row"><span class="spec">H1 / 36</span><span class="samp d" style="font-size:32px">Spend &amp; ROI Intelligence</span></div>
  <div class="row"><span class="spec">H3 / 24</span><span class="samp d" style="font-size:24px">Unified KPI Cockpit</span></div>
  <div class="row"><span class="spec">Body / 16</span><span class="samp s" style="font-size:16px">Connect your stack and let Alfred reconcile the numbers.</span></div>
  <div class="row"><span class="spec">Caption / 12</span><span class="samp s" style="font-size:12px; color:var(--ink-500)">vs last 30 days · updated 4m ago</span></div>
</body>
</html>
