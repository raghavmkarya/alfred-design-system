<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="From inputs to large surfaces" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; padding: 24px; font-family: var(--font-sans); }
  .row { display:flex; gap:20px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width: 72px; height: 56px; background: var(--orange-50); border: 1.5px solid var(--orange-300); }
  .n { font-size: 11px; color: var(--ink-700); font-weight:700; }
  .px { font-size: 11px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="row" id="s"></div>
<script>
  const steps = [["sm",8],["md",12],["lg",16],["xl",20],["2xl",24],["3xl",32],["pill",999]];
  document.getElementById('s').innerHTML = steps.map(([n,px])=>
    `<div class="col"><div class="box" style="border-radius:${px}px"></div><div class="n">${n}</div><div class="px">${px>900?'full':px}</div></div>`
  ).join('');
</script>
</body>
</html>
