<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alfred ai — Workspace</title>
<link rel="icon" href="../../assets/logos/alfred-favicon-black.svg" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-canvas); overflow: hidden; }
  #root { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="AuthScreen.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="Screens2.jsx"></script>
<script type="text/babel" src="Screens3.jsx"></script>
<script type="text/babel" src="Screens4.jsx"></script>
<script type="text/babel">
const LOGOROOT = "../../assets/logos";
const ICONROOT = "../../assets/icons";
const { Avatar, Badge } = window.AlfredAIDesignSystem_1ce241;

const NAV = [
  { id: "home", glyph: "home", label: "Home" },
  { id: "briefing", glyph: "briefing", label: "Daily Briefing" },
  { id: "ask", glyph: "ask", label: "Seek Alfred" },
  { id: "cockpit", glyph: "cockpit", label: "KPI Cockpit" },
  { id: "spend", glyph: "spend", label: "Spend & ROI" },
  { id: "alerts", glyph: "alerts", label: "Decision Alerts", badge: "3" },
  { id: "creative", glyph: "creative", label: "Creative" },
  { id: "visibility", glyph: "visibility", label: "AI Visibility" },
  { id: "integrations", glyph: "integrations", label: "Integrations" },
  { id: "notifications", glyph: "alerts", label: "Notifications", badge: "2" },
  { id: "memory", glyph: "briefing", label: "Alfred Core" },
  { id: "connections", glyph: "integrations", label: "Connect data" },
  { id: "health", glyph: "visibility", label: "Connection health" },
  { id: "team", glyph: "settings", label: "Team" },
  { id: "billing", glyph: "spend", label: "Billing" },
  { id: "audit", glyph: "search", label: "Audit log" },
  { id: "settings", glyph: "settings", label: "Settings" },
];

function Bell() {
  return (
    <button title="Alerts" style={{
      position: "relative", width: 42, height: 42, borderRadius: "50%", border: "1px solid var(--border-subtle)",
      background: "#fff", cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "var(--ink-600)",
    }}>
      <window.NavGlyph d={window.AppGlyphs.alerts} size={19} />
      <span style={{ position: "absolute", top: 8, right: 9, width: 9, height: 9, borderRadius: "50%", background: "var(--orange-500)", border: "2px solid #fff" }} />
    </button>
  );
}

const SCREENS = {
  home: () => <window.Dashboard />,
  briefing: () => <window.DailyBrief />,
  ask: () => <window.SeekAlfred />,
  cockpit: () => <window.KpiCockpit />,
  spend: () => <window.SpendRoi />,
  alerts: () => <window.AlertsInbox />,
  creative: () => <window.CreativeLifecycle />,
  visibility: () => <window.AiVisibility />,
  integrations: () => <window.Integrations />,
  notifications: () => <window.NotificationsCenter />,
  memory: () => <window.MemoryCore />,
  connections: () => <window.ConnectionFlow />,
  health: () => <window.ConnectionHealth />,
  team: () => <window.TeamPermissions />,
  billing: () => <window.BillingPlans />,
  audit: () => <window.AuditLog />,
  settings: () => <window.SettingsScreen />,
  profile: () => <window.SettingsProfile />,
  "alert-detail": () => <window.AlertDetail />,
  "first-run": () => <window.FirstRunWaiting />,
};

function App() {
  const [authed, setAuthed] = React.useState(false);
  const [active, setActive] = React.useState("home");
  if (!authed) return <window.AuthScreen onSignedIn={() => setAuthed(true)} />;

  const titles = {
    home: ["Home", "Tuesday, 11 June · Northwind Co."],
    briefing: ["Daily Briefing", "What changed, why, and what to do"],
    ask: ["Seek Alfred", "Ask anything — answered from your data"],
    cockpit: ["Unified KPI Cockpit", "All metrics, one source of truth"],
    spend: ["Spend & ROI Intelligence", "Where every dollar is working"],
    alerts: ["Real-Time Decision Alerts", "What needs your attention now"],
    creative: ["Creative Lifecycle", "Fatigue, caught before the metrics show it"],
    visibility: ["AI Visibility Score", "Whether AI recommends you — and what to fix"],
    integrations: ["Integrations", "Connect your marketing stack"],
    notifications: ["Notifications", "Briefs, alerts and approvals — in one inbox"],
    memory: ["Alfred Core", "Everything I've learned about your org"],
    connections: ["Connect your data", "Read-only by default, first sync in minutes"],
    health: ["Connection health", "Every source, its freshness and status"],
    team: ["Team & permissions", "Seats, roles and invites"],
    billing: ["Billing & plans", "Your plan, usage and invoices"],
    audit: ["Audit log", "Every action — mine and yours — on the record"],
    settings: ["Settings", "Workspace & team"],
    profile: ["Profile", "You and your preferences"],
    "alert-detail": ["Decision alert", "What changed, why, and what I recommend"],
    "first-run": ["Preparing your first brief", "I'm learning your baseline now"],
  };
  const [title, subtitle] = titles[active] || titles.home;

  return (
    <window.AppShell
      nav={NAV} active={active} onNav={setActive}
      title={title} subtitle={subtitle}
      logoRoot={LOGOROOT} iconRoot={ICONROOT}
      headerRight={<><Bell /><Avatar name="Priya Menon" size={42} /></>}
    >
      {(SCREENS[active] || SCREENS.home)()}
    </window.AppShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
