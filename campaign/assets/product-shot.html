<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred product shot</title>
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="./product-shot.css" />
</head>
<body>
  <main class="product-canvas">
    <article class="product-bezel">
      <aside class="product-sidebar">
        <strong>A</strong>
        <i></i><i></i><i></i><i></i><i></i>
      </aside>
      <section class="product-interface">
        <header>
          <div><p id="product-kicker">Alfred product</p><h1 id="product-name"></h1></div>
          <span>Northwind Labs demo</span>
        </header>
        <div class="product-grid">
          <article class="primary-insight">
            <p>What changed</p>
            <h2 id="product-focus"></h2>
            <div class="product-chart"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
          </article>
          <article class="evidence-card">
            <p>Evidence status</p>
            <strong>Sources connected</strong>
            <ol><li><span></span>Source freshness</li><li><span></span>Period and unit</li><li><span></span>Confidence</li></ol>
          </article>
          <article class="decision-card">
            <p>Recommended next step</p>
            <h3>Review evidence before approval.</h3>
            <div><span>Reversible</span><button type="button">Inspect decision</button></div>
          </article>
        </div>
        <footer><span>Source · period · unit · status</span><span id="product-id"></span></footer>
      </section>
    </article>
  </main>
  <script src="../generated/alfred-flagship-launch/product-assets.js"></script>
  <script src="./product-shot.js"></script>
</body>
</html>
