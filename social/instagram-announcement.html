<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — Instagram announcement square (1080×1080)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       instagram-announcement — launch square, 1080×1080 (1:1).
       Fixed 1080×1080 frame. Screenshot at exactly that size
       (see social/README.md). Also valid as a Facebook square.

       SLOTS (find-and-replace the inner text of the marked elements):
       eyebrow     — kicker, e.g. Now live — Alfred for Marketing
       headline    — the hook; sentence case, ≤ 3 lines at 96px
       cta         — the one CTA line, e.g. Seek Alfred at seekalfred.ai
       ============================================================ */
    :root { --frame-w: 1080px; --frame-h: 1080px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 84px 84px 72px;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* faint dot texture, bottom-weighted */
    .dots-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.10) 1.25px, transparent 1.25px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(80% 55% at 50% 100%, #000 0%, transparent 100%);
      mask-image: radial-gradient(80% 55% at 50% 100%, #000 0%, transparent 100%);
    }

    .head img { height: 34px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 34px;
    }
    .headline {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 96px;
      line-height: 1.03;
      letter-spacing: -0.035em;
      color: #fff;
      margin: 0 0 64px;
      max-width: 11ch;
    }
    .headline .quiet { color: var(--text-secondary); }
    /* the one CTA — primary pill, brand orange = action */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      align-self: flex-start;
      background: var(--orange-500);
      color: var(--text-on-brand);
      border-radius: var(--radius-pill);
      padding: 20px 36px;
      font-family: var(--font-sans);
      font-weight: var(--fw-semibold);
      font-size: 25px;
      letter-spacing: -0.005em;
      box-shadow: 0 18px 48px rgba(255, 132, 49, 0.28);
    }
    .cta svg { width: 24px; height: 24px; }

    .footer {
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 18px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots-bg"></div>

    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: eyebrow -->
      <p class="eyebrow" data-slot="eyebrow">Alfred for Marketing</p>

      <!-- SLOT: headline -->
      <h1 class="headline" data-slot="headline">Not another dashboard. <span class="quiet">An answer.</span></h1>

      <!-- SLOT: cta — one line, one action -->
      <span class="cta">
        <span data-slot="cta">Seek Alfred at seekalfred.ai</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14" /><path d="m13 6 6 6-6 6" />
        </svg>
      </span>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
