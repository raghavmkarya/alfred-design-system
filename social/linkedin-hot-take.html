<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn hot-take card (1200×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       linkedin-hot-take — the POV statement card, 1200×1350 (8:9).
       Fixed 1200×1350 frame. Screenshot at exactly that size
       (see social/README.md).

       Daily-cadence card: one bold, defensible position — a stance,
       not a stat. If the take needs a number to land, it isn't a
       take; move it to the stat card with a citation.

       SLOTS (find-and-replace the inner text of the marked elements):
       statement   — the take; sentence case, ≤ 3 lines at 108px
       support     — the one-line defence
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 96px 96px 84px;
      isolation: isolate;
    }

    .head img { height: 38px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--font-mono);
      font-weight: var(--fw-bold);
      font-size: 20px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange-500);
      margin: 0 0 40px;
    }
    .eyebrow .tick {
      width: 36px; height: 3px;
      border-radius: 999px;
      background: var(--orange-500);
    }
    .statement {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 108px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #fff;
      margin: 0 0 56px;
      max-width: 11ch;
    }
    .support {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 30px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0;
      max-width: 28ch;
    }
    .support b { color: #fff; font-weight: var(--fw-semibold); }

    .footer {
      margin-top: 48px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <p class="eyebrow"><span class="tick"></span>The take</p>

      <!-- SLOT: statement — the take -->
      <h1 class="statement" data-slot="statement">Dashboards are where decisions go to wait.</h1>

      <!-- SLOT: support — the one-line defence -->
      <p class="support" data-slot="support">The report isn&rsquo;t the work. <b>The decision is the work</b> — everything else is prelude.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
