<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — YouTube stat thumbnail (1280×720)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       youtube-thumb-stat — sourced-stat thumbnail, 1280×720.
       Fixed 1280×720 frame. Screenshot at exactly that size
       (see social/README.md).

       THE RULE THIS CARD EMBODIES: no fabricated proof. The stat,
       claim and citation travel together — swap the number, swap the
       visible "Source:" chip with it, or the card does not ship.
       The chip won't read at 168px wide; it reads on the watch page
       — repeat the citation in the video description anyway.

       THUMBNAIL RULE: the number does the work at small size.
       Keep it ≤ 4 characters at 380px.

       SLOTS (find-and-replace the inner text of the marked elements):
       stat        — the number, e.g. 63%
       claim       — what the number means, ≤ 3 short lines
       source      — the visible citation (REQUIRED)
       ============================================================ */
    :root { --frame-w: 1280px; --frame-h: 720px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 64px 80px 56px;
      isolation: isolate;
    }

    .main {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 64px;
      min-height: 0;
    }
    /* the stat is the one gradient element on this view */
    .stat {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-semibold);
      font-size: 380px;
      line-height: 0.95;
      letter-spacing: -0.05em;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      flex: none;
      margin-left: -10px;
    }
    .right { display: flex; flex-direction: column; gap: 32px; min-width: 0; }
    .claim {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: 58px;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: #fff;
      margin: 0;
      max-width: 13ch;
    }
    /* the visible citation — this chip is NOT optional */
    .source {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      align-self: flex-start;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      padding: 12px 22px;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 20px;
      color: var(--text-secondary);
    }
    .source svg { width: 20px; height: 20px; color: var(--text-muted); }

    .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .foot img { height: 38px; width: auto; display: block; opacity: 0.96; }
    .foot .site {
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 23px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="main">
      <!-- SLOT: stat -->
      <div class="stat" data-slot="stat">63%</div>

      <div class="right">
        <!-- SLOT: claim -->
        <h1 class="claim" data-slot="claim">of leaders miss opportunities — decisions take too long.</h1>

        <!-- SLOT: source — REQUIRED. No visible citation, no card. -->
        <span class="source">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
            <path d="M14 3v5h5" />
            <path d="M9 13h6M9 17h6" />
          </svg>
          <span>Source: <span data-slot="source">PwC CMO Survey, 2025</span></span>
        </span>
      </div>
    </div>

    <div class="foot">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
      <span class="site">seekalfred.ai</span>
    </div>
  </div>
</body>
</html>
