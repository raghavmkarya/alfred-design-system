<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — OG blog template · light (1200×630)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       og-blog-light — LIGHT VARIANT of og-blog.html.
       Same slots, same rules, white canvas.
       Fixed 1200×630 frame. Screenshot at exactly that size
       (see social/README.md).

       SLOTS (find-and-replace the inner text of the marked elements):
       ┌───────────────┬───────────────────────────────────────────────┐
       │ data-slot     │ what goes in it                               │
       ├───────────────┼───────────────────────────────────────────────┤
       │ pillar        │ the content pillar chip, sentence case —      │
       │               │ e.g. Decision intelligence, Alfred Core,      │
       │               │ Marketing ops, Company                        │
       │ title         │ post title, sentence case, ≤ ~70 chars;       │
       │               │ clips at 2 lines                              │
       │ author-name   │ e.g. [FOUNDER NAME]                           │
       │ author-role   │ e.g. [ROLE]                                   │
       │ date          │ e.g. July 2026 (month + year is enough)       │
       └───────────────┴───────────────────────────────────────────────┘

       PLACEHOLDER CONVENTION: bracketed values like [FOUNDER NAME]
       and [ROLE] are unset slots — replace every bracketed value
       with the real, approved person before export. Never ship a
       card with brackets visible.
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 630px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #fff;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 64px 80px 56px;
      isolation: isolate;
    }

    /* the one gradient element on this view — signature hairline, top edge */
    .brand-rule {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient-brand);
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .head img { height: 34px; width: auto; display: block; }
    .head .section {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    /* pillar chip — sunken gray fill + hairline, periwinkle marker dot */
    .pillar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      align-self: flex-start;
      background: var(--surface-sunken);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      padding: 9px 18px;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 17px;
      color: var(--text-secondary);
      margin: 0 0 26px;
    }
    .pillar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--periwinkle-400);
    }
    .title {
      font-family: var(--font-display);      /* Clash Display on light */
      font-weight: var(--fw-medium);
      font-size: 62px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0;
      max-width: 19ch;
      display: -webkit-box;
      -webkit-line-clamp: 2;                  /* hard two-line fit */
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
    }
    .author {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--surface-sunken);
      border: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.02em;
      color: var(--periwinkle-600);          /* deeper periwinkle — 300 is too faint on light */
    }
    .author .name {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 20px;
      color: var(--text-primary);
    }
    .author .role {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 17px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .meta {
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 18px;
      color: var(--text-muted);
    }
    .meta b { color: var(--text-secondary); font-weight: var(--fw-medium); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="brand-rule"></div>

    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
      <span class="section">Blog</span>
    </header>

    <div class="message">
      <!-- SLOT: pillar — content pillar chip, sentence case -->
      <span class="pillar"><span class="dot"></span><span data-slot="pillar">Decision intelligence</span></span>
      <!-- SLOT: title — sentence case, ≤ ~70 chars, clips at 2 lines -->
      <h1 class="title" data-slot="title">What is an organisation brain?</h1>
    </div>

    <footer class="footer">
      <div class="author">
        <!-- initials update with the author; keep 2 letters (real initials) -->
        <span class="avatar" data-slot="author-initials">[XX]</span>
        <span>
          <span class="name" data-slot="author-name">[FOUNDER NAME]</span>
          <!-- SLOT: author-role · date -->
          <div class="role"><span data-slot="author-role">[ROLE]</span> · <span data-slot="date">July 2026</span></div>
        </span>
      </div>
      <span class="meta"><b>seekalfred.ai</b>/blog</span>
    </footer>
  </div>
</body>
</html>
