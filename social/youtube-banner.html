<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — YouTube channel banner · 2560×1440</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       YouTube channel banner — export .frame at exactly 2560×1440.

       Safe zones (YouTube crops per device):
         · TV          — the full 2560×1440
         · desktop     — a 2560×423 band across the middle
         · mobile/min  — the central 1546×423 "device-safe" area
       Everything readable lives inside that central 1546×423 —
       only the dot texture bleeds beyond it.

       One gradient element per view = the gradient mark inside the
       lockup (alfred-logo-color-white.svg). Everything else is
       white / white-alpha on pure black.
       ============================================================ */
    :root { --frame-w: 2560px; --frame-h: 1440px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);        /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* —— subtle dot pattern, fading out toward the edges —— */
    .dots {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.13) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
      background-position: 15px 15px;
      -webkit-mask-image: radial-gradient(40% 45% at 50% 50%, #000 18%, transparent 100%);
      mask-image: radial-gradient(40% 45% at 50% 50%, #000 18%, transparent 100%);
    }

    /* —— the device-safe column: 1546×423, centered —— */
    .safe {
      width: 1546px;
      height: 423px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* —— lockup: gradient mark + white wordmark —— */
    .lockup img { height: 56px; width: auto; display: block; }

    .tagline {
      font-family: var(--font-display);            /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 52px;
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 36px 0 0;
      text-align: center;
    }
    .tagline .quiet { color: var(--text-secondary); }

    .site {
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 22px;
      letter-spacing: 0.01em;
      color: var(--text-muted);
      margin: 20px 0 0;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots"></div>

    <div class="safe">
      <div class="lockup">
        <img src="../assets/logos/alfred-logo-color-white.svg" alt="Alfred" />
      </div>

      <p class="tagline">Decision intelligence <span class="quiet">for the leaders who decide things</span></p>

      <p class="site">seekalfred.ai</p>
    </div>
  </div>
</body>
</html>
