<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn myth vs fact card (1200×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       linkedin-myth-fact — the misconception card, 1200×1350 (8:9).
       Fixed 1200×1350 frame. Screenshot at exactly that size
       (see social/README.md).

       Daily-cadence card: correct one common belief per post. The
       myth is struck through and muted; the fact is white and leads.
       Keep both to one sentence — the contrast IS the design.

       SLOTS (find-and-replace the inner text of the marked elements):
       myth        — the common belief, one sentence
       fact        — the correction, one sentence
       bridge      — the Alfred line, third person, one sentence
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 96px 96px 84px;
      isolation: isolate;
    }

    .head img { height: 38px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .label {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      gap: 12px;
      border-radius: var(--radius-pill);
      padding: 11px 24px;
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0 0 28px;
    }
    .label.myth {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      color: var(--text-muted);
    }
    .label.fact {
      background: rgba(167, 167, 252, 0.1);
      border: 1px solid rgba(167, 167, 252, 0.38);
      color: var(--periwinkle-400);
    }

    .myth-line {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 64px;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-thickness: 3px;
      text-decoration-color: rgba(255, 255, 255, 0.35);
      margin: 0 0 72px;
      max-width: 16ch;
    }
    .fact-line {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: 84px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #fff;
      margin: 0;
      max-width: 14ch;
    }

    .bridge {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 25px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 64px 0 0;
      max-width: 36ch;
    }
    .bridge b { color: #fff; font-weight: var(--fw-semibold); }

    .footer {
      margin-top: 48px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <span class="label myth">Myth</span>
      <!-- SLOT: myth — the common belief -->
      <p class="myth-line" data-slot="myth">More dashboards mean more clarity.</p>

      <span class="label fact">Fact</span>
      <!-- SLOT: fact — the correction -->
      <h1 class="fact-line" data-slot="fact">Clarity is a decision, not another chart.</h1>

      <!-- SLOT: bridge — Alfred in third person, one sentence -->
      <p class="bridge" data-slot="bridge">Alfred does the reading and leads with the call — <b>the charts become the appendix</b>.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
