<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn tip card (1200×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       linkedin-tip — the "field notes" daily tip, 1200×1350 (8:9).
       Fixed 1200×1350 frame. Screenshot at exactly that size
       (see social/README.md).

       Daily-cadence card: one sharp, practical tip per post — no
       numbers, no proof claims, so no citation needed. If a tip DOES
       quote a number, it moves to the stat card and brings a source.

       SLOTS (find-and-replace the inner text of the marked elements):
       eyebrow     — series kicker + number, e.g. Field notes · No. 12
       title       — the tip itself, imperative, ≤ 3 lines
       body        — why it matters, 1–2 sentences
       bridge      — the Alfred line, third person, one sentence
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 96px 96px 84px;
      isolation: isolate;
    }

    .head img { height: 38px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-mono);
      font-weight: var(--fw-bold);
      font-size: 20px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 36px;
    }
    .title {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 92px;
      line-height: 1.04;
      letter-spacing: -0.035em;
      color: #fff;
      margin: 0 0 40px;
      max-width: 13ch;
    }
    .body {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 30px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0;
      max-width: 30ch;
    }
    .body b { color: #fff; font-weight: var(--fw-semibold); }

    .bridge {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 25px;
      line-height: 1.45;
      color: var(--text-muted);
      margin: 64px 0 0;
      padding-top: 40px;
      border-top: 1px solid var(--border-subtle);
      max-width: 36ch;
    }
    .bridge b { color: var(--text-secondary); font-weight: var(--fw-semibold); }

    .footer {
      margin-top: 48px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: eyebrow — series + number; count up per post -->
      <p class="eyebrow" data-slot="eyebrow">Field notes · No. 12</p>

      <!-- SLOT: title — the tip, imperative -->
      <h1 class="title" data-slot="title">Set the kill threshold before you launch.</h1>

      <!-- SLOT: body — why it matters -->
      <p class="body" data-slot="body">Decide the exit <b>before the money moves</b>. Mid-flight judgment is how budgets burn quietly.</p>

      <!-- SLOT: bridge — Alfred in third person, one sentence -->
      <p class="bridge" data-slot="bridge">Alfred watches the threshold for you — <b>and briefs you the morning it trips</b>.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
