<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — integration spotlight (1080×1080)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       integration-spotlight — "works with your stack" square,
       1080×1080 (1:1). Fixed frame; screenshot at exactly that size
       (see social/README.md).

       CROSS-PLATFORM: works on LinkedIn, Instagram, Facebook and X.
       One integration per post — cycle through the connected stack
       (see data/demo-data.json integrations for the canonical list).

       PARTNER NAMES ARE TEXT. We do not ship third-party logos —
       using a partner's mark needs their brand permission; the
       typographic "Alfred × Name" lockup avoids the question.

       SLOTS (find-and-replace the inner text of the marked elements):
       partner     — the integration name, e.g. HubSpot
       category    — its category chip, e.g. CRM & pipeline
       line        — what the connection gives the brief, one sentence
       ============================================================ */
    :root { --frame-w: 1080px; --frame-h: 1080px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 84px 84px 72px;
      isolation: isolate;
    }

    .head img { height: 34px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 44px;
    }

    /* the typographic lockup — Alfred × Partner */
    .lockup {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 92px;
      line-height: 1.08;
      letter-spacing: -0.035em;
      color: #fff;
      margin: 0 0 44px;
      max-width: 12ch;
    }
    .lockup .x { color: var(--text-muted); font-weight: var(--fw-regular); padding: 0 6px; }

    .chips { display: flex; flex-wrap: wrap; gap: 14px; margin: 0 0 48px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      padding: 12px 22px;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 20px;
      color: var(--text-secondary);
    }
    .chip .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--success-500);
    }

    .line {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 29px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0;
      max-width: 30ch;
    }
    .line b { color: #fff; font-weight: var(--fw-semibold); }

    .footer {
      margin-top: 48px;
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 18px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <p class="eyebrow">Works with your stack</p>

      <!-- SLOT: partner — text lockup only, no third-party logos -->
      <h1 class="lockup">Alfred <span class="x">×</span> <span data-slot="partner">HubSpot</span></h1>

      <div class="chips">
        <!-- SLOT: category -->
        <span class="chip"><span data-slot="category">CRM &amp; pipeline</span></span>
        <span class="chip"><span class="dot"></span>Live sync</span>
      </div>

      <!-- SLOT: line -->
      <p class="line" data-slot="line">Pipeline context lands in every morning brief — <b>spend decisions that know what sales closed</b>.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
