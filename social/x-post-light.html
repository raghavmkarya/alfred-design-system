<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — X post card · light (1200×675)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       x-post-light — LIGHT VARIANT of x-post.html.
       Same slots, same rules, white canvas. 1200×675 (16:9).
       Fixed 1200×675 frame. Screenshot at exactly that size
       (see social/README.md).

       Daily-cadence card: X's feed renders 16:9 images edge to edge;
       this is the take/announcement/one-liner canvas for that feed.
       Keep the statement ≤ 2 lines — X crops aggressively on some
       surfaces, so nothing critical near the edges (56px inset).

       SLOTS (find-and-replace the inner text of the marked elements):
       eyebrow     — kicker, e.g. Alfred for Marketing
       statement   — the line; sentence case, ≤ 2 lines at 92px
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 675px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #fff;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 64px 72px 52px;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* faint dot texture, bottom-right weighted — ink on white */
    .dots-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(2,2,30,0.10) 1.25px, transparent 1.25px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(55% 80% at 85% 90%, #000 0%, transparent 100%);
      mask-image: radial-gradient(55% 80% at 85% 90%, #000 0%, transparent 100%);
    }

    .head img { height: 34px; width: auto; display: block; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-600);          /* readable periwinkle on white */
      margin: 0 0 26px;
    }
    .statement {
      font-family: var(--font-display);      /* Clash Display on light */
      font-weight: var(--fw-medium);
      font-size: 92px;
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin: 0;
      max-width: 14ch;
    }
    .statement .quiet { color: var(--text-secondary); }

    .footer {
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots-bg"></div>

    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: eyebrow -->
      <p class="eyebrow" data-slot="eyebrow">Alfred for Marketing</p>

      <!-- SLOT: statement -->
      <h1 class="statement" data-slot="statement">Decisions, <span class="quiet">not dashboards.</span></h1>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
