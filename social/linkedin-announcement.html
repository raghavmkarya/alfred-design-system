<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn announcement card (1200×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       linkedin-announcement — launch / announcement card (LinkedIn 4:5).
       Fixed 1200×1350 frame. Screenshot at exactly that size
       (see social/README.md).

       Structure is deliberately spare: eyebrow + headline + one CTA
       line. If the announcement needs proof, use linkedin-stat
       (sourced) or linkedin-insight (Northwind-framed) instead of
       adding numbers here.

       SLOTS (find-and-replace the inner text of the marked elements):
       eyebrow     — UPPERCASE tracked, e.g. NOW LIVE — ALFRED FOR
                     MARKETING, NEW — ALFRED FOR SALES, ANNOUNCEMENT
       headline    — sentence case, short; the module tagline works
                     well ("Read less, know more.")
       cta         — the one CTA line, e.g. Seek Alfred at seekalfred.ai
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 96px 96px 84px;
      isolation: isolate;
    }
    /* ambient brand glows — the launch-moment hero treatment
       (dark-tuned tokens; this is the view's gradient element) */
    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .frame::before { background: var(--glow-periwinkle); }
    .frame::after  { background: var(--glow-orange); opacity: 0.6; }
    .frame > * { position: relative; z-index: 1; }

    .head img { height: 38px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 20px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 36px;
    }
    .headline {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 116px;
      line-height: 1.02;
      letter-spacing: -0.035em;
      color: #fff;
      margin: 0 0 72px;
      max-width: 11ch;
    }
    /* the one CTA — primary pill, brand orange = action */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      align-self: flex-start;
      background: var(--orange-500);
      color: var(--text-on-brand);
      border-radius: var(--radius-pill);
      padding: 22px 40px;
      font-family: var(--font-sans);
      font-weight: var(--fw-semibold);
      font-size: 27px;
      letter-spacing: -0.005em;
      box-shadow: 0 18px 48px rgba(255, 132, 49, 0.28);
    }
    .cta svg { width: 26px; height: 26px; }

    .footer {
      margin-top: 64px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: eyebrow -->
      <p class="eyebrow" data-slot="eyebrow">Now live — Alfred for Marketing</p>

      <!-- SLOT: headline -->
      <h1 class="headline" data-slot="headline">Read less, know more.</h1>

      <!-- SLOT: cta — one line, one action -->
      <span class="cta">
        <span data-slot="cta">Seek Alfred at seekalfred.ai</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14" /><path d="m13 6 6 6-6 6" />
        </svg>
      </span>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
