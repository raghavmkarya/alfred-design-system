<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — Instagram story stat · light (1080×1920)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       instagram-story-stat-light — LIGHT VARIANT of instagram-story-stat.html.
       Same slots, same rules, white canvas. 9:16 sourced-stat story,
       1080×1920. Fixed 1080×1920 frame. Screenshot at exactly that
       size (see social/README.md).

       SAFE ZONES: content stays inside the central band, clear of
       the ~250px story chrome top and bottom (padding does the work).

       THE RULE THIS CARD EMBODIES: no fabricated proof. The stat,
       claim and citation travel together — swap the number, swap the
       visible "Source:" chip with it, or the card does not ship.
       Real market-level stats only; Northwind demo numbers belong on
       the insight cards, framed as demo data.

       SLOTS (find-and-replace the inner text of the marked elements):
       stat        — the number, e.g. 37%  (keep to ~4 characters)
       claim       — what the number means, sentence case, ≤ 3 lines
       source      — the visible citation (REQUIRED)
       bridge      — the Alfred line, third person, one sentence
       ============================================================ */
    :root { --frame-w: 1080px; --frame-h: 1920px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #fff;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      /* 280px top/bottom keeps everything clear of story chrome */
      padding: 280px 96px;
      isolation: isolate;
    }

    .head img { height: 40px; width: auto; display: block; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 10px;
    }
    /* the stat is the one gradient element on this view */
    .stat {
      font-family: var(--font-display);      /* Clash Display on light */
      font-weight: var(--fw-medium);
      font-size: 300px;
      line-height: 1;
      letter-spacing: -0.03em;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 30px -8px;
    }
    .claim {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: 56px;
      line-height: 1.14;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0 0 40px;
      max-width: 16ch;              /* Clash runs narrower per ch — matches the dark card's wrap */
    }
    /* the visible citation — this chip is NOT optional */
    .source {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      align-self: flex-start;
      background: var(--surface-sunken);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      padding: 13px 24px;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 21px;
      color: var(--text-secondary);
    }
    .source svg { width: 21px; height: 21px; color: var(--text-muted); }

    .bridge {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 29px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 56px 0 0;
      max-width: 28ch;
    }
    .bridge b { color: var(--text-primary); font-weight: var(--fw-semibold); }

    .footer {
      padding-top: 32px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 21px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
    </header>

    <div class="message">
      <p class="eyebrow">The problem, quantified</p>

      <!-- SLOT: stat -->
      <div class="stat" data-slot="stat">37%</div>

      <!-- SLOT: claim -->
      <h1 class="claim" data-slot="claim">of leaders have a centralised data repository. The rest stitch the story by hand.</h1>

      <!-- SLOT: source — REQUIRED. No visible citation, no card. -->
      <span class="source">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
          <path d="M14 3v5h5" />
          <path d="M9 13h6M9 17h6" />
        </svg>
        <span>Source: <span data-slot="source">NIQ CMO Outlook, 2026</span></span>
      </span>

      <!-- SLOT: bridge — Alfred in third person, one sentence -->
      <p class="bridge" data-slot="bridge">Alfred is the layer that stitches it together — <b>and does the reading for you</b>.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
