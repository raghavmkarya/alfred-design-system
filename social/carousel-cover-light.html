<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn carousel · cover · light · 1080×1350</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       carousel-cover-light — LIGHT VARIANT of carousel-cover.html.
       Same slots, same rules, white canvas.
       Export .frame at exactly 1080×1350 (4:5). Pair with
       carousel-slide-light.html for pages 2…N.

       Slots (marked in the markup):
         · EYEBROW  — series kicker, UPPERCASE tracked, periwinkle
         · TITLE    — the hook; sentence case, ≤ 3 lines at 88px
         · DOTS     — one dot per page; first dot active (orange)
         · FOOTER   — swipe hint + seekalfred.ai (usually fixed)

       Voice: marketing — third person about Alfred, sentence case,
       no emoji. Orange = the single action accent (active dot).
       ============================================================ */
    html, body {
      margin: 0;
      background: #ececef;               /* bench chrome — not part of the asset */
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ============ THE EXPORTABLE CANVAS — 1080×1350 ============ */
    .frame {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: var(--bg-page);        /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 84px;
      box-sizing: border-box;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* faint dot texture, bottom-weighted */
    .dots-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(2,2,30,0.09) 1.25px, transparent 1.25px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(80% 60% at 50% 96%, #000 0%, transparent 100%);
      mask-image: radial-gradient(80% 60% at 50% 96%, #000 0%, transparent 100%);
    }

    /* ---------- header ---------- */
    .head img { height: 30px; width: auto; display: block; }

    /* ---------- title block ---------- */
    .hero { margin-top: auto; margin-bottom: auto; padding: 40px 0; }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--periwinkle-600);      /* deeper periwinkle for contrast on white */
      margin: 0 0 26px;
    }
    .title {
      font-family: var(--font-display);            /* Clash Display on light */
      font-weight: 600;
      font-size: 88px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0;
      max-width: 12ch;
    }
    .title .quiet { color: var(--text-secondary); }

    /* ---------- page dots ---------- */
    .pager { display: flex; align-items: center; gap: 10px; margin-top: 48px; }
    .pager span {
      width: 9px; height: 9px; border-radius: 999px;
      background: rgba(2,2,30,0.15);
      display: block;
    }
    .pager .active { width: 30px; background: var(--orange-500); }

    /* ---------- footer ---------- */
    .footer {
      padding-top: 28px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .swipe {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 18px;
      color: var(--text-primary);
    }
    .swipe svg { width: 20px; height: 20px; color: var(--orange-500); }
    .site {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 17px;
      letter-spacing: 0.01em;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots-bg"></div>

    <!-- header (fixed) -->
    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
    </header>

    <div class="hero">
      <!-- SLOT: EYEBROW — series kicker -->
      <p class="eyebrow">Decision intelligence, explained</p>

      <!-- SLOT: TITLE — the hook; sentence case, ≤ 3 lines -->
      <h1 class="title">Not another dashboard. <span class="quiet">An answer.</span></h1>

      <!-- SLOT: DOTS — one <span> per page; move .active as pages change.
           Cover = page 1, so the first dot is active. -->
      <div class="pager" aria-label="Page 1 of 6">
        <span class="active"></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- SLOT: FOOTER — usually fixed across the series -->
    <footer class="footer">
      <span class="swipe">
        Swipe
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 8h11"/>
          <path d="M9 3.5 13.5 8 9 12.5"/>
        </svg>
      </span>
      <span class="site">seekalfred.ai</span>
    </footer>
  </div>
</body>
</html>
