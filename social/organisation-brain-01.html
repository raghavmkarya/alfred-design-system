<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — Organisation Brain · Post 01 (LinkedIn 1080×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    :root { --frame-w: 1080px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      background: #050505;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* the page IS the asset — frame sits at the origin, exact 1080×1350 */
    .stage { width: var(--frame-w); }

    /* ============ THE EXPORTABLE CANVAS — 1080×1350 (LinkedIn 4:5) ============ */
    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);                 /* #0C0C0A warm near-black */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 84px 84px 76px;
      box-sizing: border-box;
      isolation: isolate;
    }
    /* ambient brand glows — soft, low opacity (dark-tuned tokens) */
    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .frame::before { background: var(--glow-periwinkle); }
    .frame::after  { background: var(--glow-orange); opacity: 0.55; }
    .frame > * { position: relative; z-index: 1; }

    /* faint corner vignette for depth */
    .vignette {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(0,0,0,0.45) 100%);
    }

    /* ---------- header ---------- */
    .head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .head img { height: 30px; width: auto; display: block; opacity: 0.96; }

    /* ---------- message ---------- */
    .message { margin-top: 92px; }
    .eyebrow {
      font-family: var(--font-inter);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 22px;
    }
    .headline {
      font-family: var(--font-display);            /* Satoshi on dark */
      font-weight: 600;
      font-size: 80px;
      line-height: 1.03;
      letter-spacing: -0.025em;
      color: #ffffff;
      margin: 0;
      max-width: 14ch;
    }

    /* ---------- visual: fragmented functions → one brain ---------- */
    .viz {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      min-height: 0;
    }
    .viz svg { width: 100%; height: 100%; max-height: 486px; overflow: visible; }
    .node-label {
      font-family: var(--font-inter);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      fill: rgba(255,255,255,0.72);
    }

    /* ---------- definition + footer ---------- */
    .definition {
      font-family: var(--font-inter);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin: 0;
      max-width: 41ch;
    }
    .definition b { color: #ffffff; font-weight: 600; }

    .footer {
      margin-top: 34px;
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .read {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      font-family: var(--font-inter);
      font-weight: 600;
      font-size: 17px;
      color: #ffffff;
    }
    .read svg { width: 20px; height: 20px; color: var(--orange-500); }
    .site {
      font-family: var(--font-inter);
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.01em;
      color: var(--text-muted);
    }

    @media print {
      .frame { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame">
      <div class="vignette"></div>

      <!-- header -->
      <header class="head">
        <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
      </header>

      <!-- message -->
      <div class="message">
        <p class="eyebrow">Why companies struggle to think as one</p>
        <h1 class="headline">What is an organisation brain?</h1>
      </div>

      <!-- visual: five functions ring one brain (regular pentagon, point-up) -->
      <div class="viz">
        <svg viewBox="0 0 940 520" role="img" aria-label="Five business functions — Founders, Marketing, Finance, Sales and Operations — converging into one Alfred brain">
          <defs>
            <linearGradient id="brainGrad" x1="396.762" y1="35.1" x2="-21.01" y2="275.45" gradientUnits="userSpaceOnUse">
              <stop stop-color="#A7A7FC"/>
              <stop offset="0.7098" stop-color="#FF8431"/>
            </linearGradient>
            <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%"  stop-color="rgba(255,150,80,0.36)"/>
              <stop offset="38%" stop-color="rgba(167,167,252,0.21)"/>
              <stop offset="100%" stop-color="rgba(167,167,252,0)"/>
            </radialGradient>
            <!-- radial: every spoke brightens toward the brain (inflow), regardless of angle -->
            <radialGradient id="lineGrad" cx="470" cy="258" r="210" gradientUnits="userSpaceOnUse">
              <stop offset="0"    stop-color="rgba(255,132,49,0.90)"/>
              <stop offset="0.5"  stop-color="rgba(255,150,90,0.58)"/>
              <stop offset="1"    stop-color="rgba(167,167,252,0.14)"/>
            </radialGradient>
          </defs>

          <!-- core aura + intake rings (brain at 470,258) -->
          <circle cx="470" cy="258" r="186" fill="url(#coreGlow)"/>
          <circle cx="470" cy="258" r="116" fill="none" stroke="rgba(255,255,255,0.10)"/>
          <circle cx="470" cy="258" r="152" fill="none" stroke="rgba(255,255,255,0.05)"/>

          <!-- converging spokes: each node -> intake ring (r116) -->
          <g stroke="url(#lineGrad)" stroke-width="2.2" stroke-linecap="round">
            <line x1="470"    y1="53"     x2="470"    y2="142"/>
            <line x1="275.03" y1="194.65" x2="359.7"  y2="222.15"/>
            <line x1="664.97" y1="194.65" x2="580.3"  y2="222.15"/>
            <line x1="349.5"  y1="423.85" x2="401.8"  y2="351.85"/>
            <line x1="590.5"  y1="423.85" x2="538.2"  y2="351.85"/>
          </g>

          <!-- inflow signal: faint mid dot + bright dot arriving at the brain -->
          <g>
            <circle cx="470"   cy="98.1"  r="2" fill="rgba(167,167,252,0.55)"/>
            <circle cx="317.9" cy="208.6" r="2" fill="rgba(255,176,123,0.55)"/>
            <circle cx="622.1" cy="208.6" r="2" fill="rgba(167,167,252,0.55)"/>
            <circle cx="376"   cy="387.4" r="2" fill="rgba(255,176,123,0.55)"/>
            <circle cx="564"   cy="387.4" r="2" fill="rgba(167,167,252,0.55)"/>
          </g>
          <g>
            <circle cx="470"   cy="142"    r="3.5" fill="#A7A7FC"/>
            <circle cx="359.7" cy="222.15" r="3.5" fill="#FFB07B"/>
            <circle cx="580.3" cy="222.15" r="3.5" fill="#A7A7FC"/>
            <circle cx="401.8" cy="351.85" r="3.5" fill="#FFB07B"/>
            <circle cx="538.2" cy="351.85" r="3.5" fill="#A7A7FC"/>
          </g>

          <!-- the five functions (siloed today) -->
          <g fill="none">
            <circle cx="470"    cy="53"     r="6.5" fill="#0C0C0A" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
            <circle cx="470"    cy="53"     r="13"  stroke="rgba(255,255,255,0.12)"/>
            <circle cx="275.03" cy="194.65" r="6.5" fill="#0C0C0A" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
            <circle cx="275.03" cy="194.65" r="13"  stroke="rgba(255,255,255,0.12)"/>
            <circle cx="664.97" cy="194.65" r="6.5" fill="#0C0C0A" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
            <circle cx="664.97" cy="194.65" r="13"  stroke="rgba(255,255,255,0.12)"/>
            <circle cx="349.5"  cy="423.85" r="6.5" fill="#0C0C0A" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
            <circle cx="349.5"  cy="423.85" r="13"  stroke="rgba(255,255,255,0.12)"/>
            <circle cx="590.5"  cy="423.85" r="6.5" fill="#0C0C0A" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
            <circle cx="590.5"  cy="423.85" r="13"  stroke="rgba(255,255,255,0.12)"/>
          </g>
          <g class="node-label">
            <text x="470"   y="30"  text-anchor="middle">Founders</text>
            <text x="253"   y="200" text-anchor="end">Marketing</text>
            <text x="687"   y="200" text-anchor="start">Finance</text>
            <text x="349.5" y="452" text-anchor="middle">Sales</text>
            <text x="590.5" y="452" text-anchor="middle">Operations</text>
          </g>

          <!-- the brain: Alfred mark in the signature gradient (single gradient hero) -->
          <g transform="translate(370.18,157.26) scale(0.46)">
            <path d="M288.241 0H145.654C65.1568 0 0 65.2299 0 145.654V291.747C0 372.244 65.1568 437.475 145.654 437.475H155.151C232.142 437.475 294.523 375.093 294.523 298.103C294.523 375.093 356.904 437.475 433.895 437.475V145.654C433.895 65.2299 368.665 0 288.241 0ZM294.523 296.35H143.828V145.581H294.523V296.35Z" fill="url(#brainGrad)"/>
          </g>
        </svg>
      </div>

      <!-- definition -->
      <p class="definition">
        An <b>organisation brain</b> connects knowledge, context, decision logic and
        outcomes into one system — so your business can remember, learn, and act as one.
      </p>

      <!-- footer -->
      <footer class="footer">
        <span class="read">
          Read the full essay
          <svg viewBox="0 0 10.49 10.491" aria-hidden="true">
            <path d="M 1.536 8.955 C 2.269 9.688 3.204 10.188 4.221 10.39 C 5.239 10.593 6.294 10.489 7.252 10.092 C 8.211 9.695 9.03 9.022 9.606 8.16 C 10.183 7.297 10.49 6.283 10.49 5.246 C 10.49 4.208 10.183 3.194 9.606 2.331 C 9.03 1.469 8.211 0.796 7.252 0.399 C 6.294 0.002 5.239 -0.102 4.221 0.101 C 3.204 0.303 2.269 0.803 1.536 1.536 C 0.552 2.52 0 3.854 0 5.246 C 0 6.637 0.552 7.971 1.536 8.955 Z M 2.958 5.661 L 3.032 3.825 C 3.041 3.618 3.127 3.421 3.274 3.275 C 3.421 3.128 3.617 3.041 3.825 3.032 L 5.66 2.959 C 6.489 2.924 6.544 4.182 5.711 4.218 L 5.129 4.241 L 7.217 6.326 C 7.812 6.926 6.911 7.793 6.325 7.218 L 4.24 5.13 L 4.217 5.711 C 4.18 6.549 2.928 6.497 2.958 5.661 Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="site">seekalfred.ai</span>
      </footer>
    </div>
  </div>
</body>
</html>
