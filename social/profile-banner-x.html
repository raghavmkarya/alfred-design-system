<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — X header · 1500×500</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       X (Twitter) profile header — export .frame at exactly 1500×500.
       Same banner system as profile-banner-linkedin.html, re-set for
       the 3:1 canvas.

       Safe zones: X overlays the circular profile avatar over the
       BOTTOM-LEFT of the header, and responsive crops shave the top
       and bottom. Content is centered with the vertical middle band
       (~500×300) treated as the safe area; keep the bottom-left
       ~360×190 region free.

       One gradient element per view = the gradient mark inside the
       lockup (alfred-logo-color-white.svg).
       ============================================================ */
    html, body {
      margin: 0;
      background: #17171a;               /* bench chrome — not part of the asset */
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ============ THE EXPORTABLE CANVAS — 1500×500 ============ */
    .frame {
      position: relative;
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: var(--bg-page);        /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* —— subtle dot pattern, fading out toward the edges —— */
    .dots {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.13) 1.25px, transparent 1.25px);
      background-size: 26px 26px;
      background-position: 13px 13px;
      -webkit-mask-image: radial-gradient(56% 105% at 50% 47%, #000 18%, transparent 100%);
      mask-image: radial-gradient(56% 105% at 50% 47%, #000 18%, transparent 100%);
    }

    /* —— lockup: gradient mark + white wordmark —— */
    .lockup img { height: 48px; width: auto; display: block; }

    /* —— tagline: category + the closing-band line, sentence case —— */
    .tagline {
      font-family: var(--font-display);            /* Satoshi on dark */
      font-weight: 500;
      font-size: 48px;
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 34px 0 0;
      text-align: center;
    }
    .tagline .quiet { color: var(--text-secondary); }

    .site {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 20px;
      letter-spacing: 0.01em;
      color: var(--text-muted);
      margin: 20px 0 0;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots"></div>

    <div class="lockup">
      <img src="../assets/logos/alfred-logo-color-white.svg" alt="Alfred" />
    </div>

    <p class="tagline">Decision intelligence <span class="quiet">for the leaders who decide things</span></p>

    <p class="site">seekalfred.ai</p>
  </div>
</body>
</html>
