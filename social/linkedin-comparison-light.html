<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — LinkedIn comparison card · light (1200×1350)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       linkedin-comparison-light — LIGHT VARIANT of linkedin-comparison.html.
       Same slots, same rules, white canvas. 1200×1350 (8:9).
       Fixed 1200×1350 frame. Screenshot at exactly that size
       (see social/README.md).

       Daily-cadence card: the old way vs with Alfred, three rows a
       side. Keep rows parallel in rhythm (each right row answers its
       left row). Principle-level only — no numbers without a source.

       SLOTS (find-and-replace the inner text of the marked elements):
       title       — the frame, e.g. Monday, before and after.
       old-1..3    — the old-way rows (muted)
       new-1..3    — the with-Alfred rows (ink)
       ============================================================ */
    :root { --frame-w: 1200px; --frame-h: 1350px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #fff;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 96px 96px 84px;
      isolation: isolate;
    }

    .head img { height: 38px; width: auto; display: block; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .title {
      font-family: var(--font-display);      /* Clash Display on light */
      font-weight: var(--fw-medium);
      font-size: 88px;
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin: 0 0 64px;
      max-width: 13ch;
    }

    .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 56px;
    }
    .col + .col { border-left: 1px solid var(--border-subtle); padding-left: 56px; }

    .col h2 {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0 0 34px;
    }
    .col.old h2 { color: var(--text-muted); }
    .col.new h2 { color: var(--orange-500); }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 0;
      border-top: 1px solid var(--border-subtle);
      font-family: var(--font-sans);
      font-size: 27px;
      line-height: 1.35;
    }
    .row svg { width: 26px; height: 26px; flex: none; margin-top: 3px; }
    .col.old .row { font-weight: var(--fw-regular); color: var(--text-muted); }
    .col.old .row svg { color: var(--text-muted); opacity: 0.7; }
    .col.new .row { font-weight: var(--fw-semibold); color: var(--text-primary); }
    .col.new .row svg { color: var(--orange-500); }

    .footer {
      margin-top: 72px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 19px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: title -->
      <h1 class="title" data-slot="title">Monday, before and after.</h1>

      <div class="cols">
        <div class="col old">
          <h2>The old way</h2>
          <!-- SLOT: old-1..3 -->
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
            <span data-slot="old-1">Eight tabs before coffee</span>
          </div>
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
            <span data-slot="old-2">An hour of report archaeology</span>
          </div>
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
            <span data-slot="old-3">Numbers argue; nobody decides</span>
          </div>
        </div>

        <div class="col new">
          <h2>With Alfred</h2>
          <!-- SLOT: new-1..3 -->
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
            <span data-slot="new-1">One brief at 9:00</span>
          </div>
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
            <span data-slot="new-2">What changed, why, what next</span>
          </div>
          <div class="row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
            <span data-slot="new-3">Evidence on every call</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
