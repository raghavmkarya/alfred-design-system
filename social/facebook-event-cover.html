<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — Facebook event cover (1920×1005)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       facebook-event-cover — event header, 1920×1005 (~1.91:1).
       Fixed 1920×1005 frame. Screenshot at exactly that size
       (see social/README.md).

       Facebook crops the outer edges on smaller viewports — content
       is inset 140px on every side. Only the dot texture bleeds.

       SLOTS (find-and-replace the inner text of the marked elements):
       eyebrow     — session kicker, e.g. Live session
       title       — the event name; sentence case, ≤ 2 lines
       date        — chip text, e.g. Thu, Jul 23
       time        — chip text, e.g. 9:00 AM PT
       ============================================================ */
    :root { --frame-w: 1920px; --frame-h: 1005px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* pure black on dark */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 140px 150px;
      isolation: isolate;
    }
    .frame > * { position: relative; z-index: 1; }

    /* faint dot texture, right-weighted */
    .dots-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.10) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
      -webkit-mask-image: radial-gradient(50% 95% at 88% 50%, #000 0%, transparent 100%);
      mask-image: radial-gradient(50% 95% at 88% 50%, #000 0%, transparent 100%);
    }

    .head img { height: 46px; width: auto; display: block; opacity: 0.96; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 24px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--periwinkle-400);
      margin: 0 0 36px;
    }
    .eyebrow .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--periwinkle-400);
      box-shadow: 0 0 0 7px rgba(167, 167, 252, 0.16);
    }
    .title {
      font-family: var(--font-display);      /* Satoshi on dark */
      font-weight: var(--fw-medium);
      font-size: 110px;
      line-height: 1.03;
      letter-spacing: -0.035em;
      color: #fff;
      margin: 0 0 52px;
      max-width: 16ch;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 18px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      padding: 16px 30px;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 26px;
      color: var(--text-secondary);
    }
    .chip svg { width: 24px; height: 24px; color: var(--text-muted); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 23px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dots-bg"></div>

    <header class="head">
      <img src="../assets/logos/alfred-logo-white.svg" alt="Alfred" />
    </header>

    <div class="message">
      <!-- SLOT: eyebrow -->
      <p class="eyebrow"><span class="dot"></span><span data-slot="eyebrow">Live session</span></p>

      <!-- SLOT: title -->
      <h1 class="title" data-slot="title">Watch Alfred brief a marketing leader, live.</h1>

      <div class="chips">
        <!-- SLOT: date -->
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="3" /><path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          <span data-slot="date">Thu, Jul 23</span>
        </span>
        <!-- SLOT: time -->
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 3" />
          </svg>
          <span data-slot="time">9:00 AM PT</span>
        </span>
      </div>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
