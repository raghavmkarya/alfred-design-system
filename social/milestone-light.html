<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred — milestone card · light (1080×1080)</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ============================================================
       milestone-light — LIGHT VARIANT of milestone.html.
       Same slots, same rules, white canvas. 1080×1080 (1:1).
       Fixed 1080×1080 frame. Screenshot at exactly that size
       (see social/README.md).

       CROSS-PLATFORM: LinkedIn, Instagram, Facebook, X.

       REAL NUMBERS ONLY. The number ships BRACKETED — [1,000] — and
       stays bracketed until you replace it with a true, current
       figure. A milestone is a public claim about Alfred itself:
       no rounding up, no projections, no reusing the live site's
       placeholder band (see LIVE-DRIFT.md).

       SLOTS (find-and-replace the inner text of the marked elements):
       number      — the real figure, e.g. 1,000 (bracketed until real)
       claim       — what it counts, e.g. of you on the waitlist.
       thanks      — the gratitude line, one sentence
       ============================================================ */
    :root { --frame-w: 1080px; --frame-h: 1080px; }

    html, body {
      margin: 0;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: #fff;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      overflow: hidden;
      background: var(--bg-page);            /* white — the light canvas */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 84px 84px 72px;
      isolation: isolate;
    }

    .head img { height: 34px; width: auto; display: block; }

    .message {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-weight: var(--fw-bold);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 10px;
    }
    /* the number is the one gradient element on this view */
    .number {
      font-family: var(--font-display);      /* Clash Display on light */
      font-weight: var(--fw-medium);
      font-size: 200px;
      line-height: 1;
      letter-spacing: -0.03em;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 22px -6px;
      font-variant-numeric: tabular-nums;
    }
    .claim {
      font-family: var(--font-display);
      font-weight: var(--fw-medium);
      font-size: 60px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0 0 40px;
      max-width: 16ch;
    }
    .thanks {
      font-family: var(--font-sans);
      font-weight: var(--fw-regular);
      font-size: 29px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0;
      max-width: 30ch;
    }
    .thanks b { color: var(--text-primary); font-weight: var(--fw-semibold); }

    .footer {
      margin-top: 48px;
      padding-top: 26px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-weight: var(--fw-medium);
      font-size: 18px;
      color: var(--text-muted);
    }
    .footer .site { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="frame">
    <header class="head">
      <img src="../assets/logos/alfred-logo-primary.svg" alt="Alfred" />
    </header>

    <div class="message">
      <p class="eyebrow">Milestone</p>

      <!-- SLOT: number — REAL figure only; bracketed until it is -->
      <div class="number" data-slot="number">[1,000]</div>

      <!-- SLOT: claim -->
      <h1 class="claim" data-slot="claim">of you on the waitlist.</h1>

      <!-- SLOT: thanks -->
      <p class="thanks" data-slot="thanks">Thank you — <b>every seat makes the brief sharper</b>. We read everything you send.</p>
    </div>

    <footer class="footer">
      <span class="site">seekalfred.ai</span>
      <span>@seekalfred</span>
    </footer>
  </div>
</body>
</html>
