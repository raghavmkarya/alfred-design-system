<!-- @template name="Alfred Sections" description="A catalog of reusable, on-brand marketing section templates — logo cloud, bento grid, feature split, comparison, pricing, testimonial, integrations & waitlist CTA. Lift any one into a page." -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alfred ai — Section templates</title>
<link rel="icon" href="../../assets/logos/alfred-favicon-white.svg" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-page); }
  .seclabel { max-width: 1120px; margin: 0 auto; padding: 40px 40px 0; display: flex; align-items: center; gap: 12px; }
  .seclabel .num { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--periwinkle-400);
    border: 1px solid var(--border-subtle); border-radius: var(--radius-pill); padding: 4px 12px; }
  .seclabel .nm { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="SectionsA.jsx"></script>
<script type="text/babel" src="SectionsB.jsx"></script>
<script type="text/babel" src="SectionsC.jsx"></script>
<script type="text/babel">
function Label({ n, name }) {
  return (
    <div className="seclabel">
      <span className="num">{n}</span>
      <span className="nm">{name}</span>
    </div>
  );
}
const CATALOG = [
  ["01", "Logo cloud", window.SecLogoCloud],
  ["02", "Bento capability grid", window.SecBentoGrid],
  ["03", "Feature split", window.SecFeatureSplit],
  ["04", "Comparison", window.SecComparison],
  ["05", "Pricing tiers", window.SecPricingTiers],
  ["06", "Testimonial", window.SecTestimonial],
  ["07", "Integrations grid", window.SecIntegrationsGrid],
  ["08", "Waitlist / CTA band", window.SecWaitlistCTA],
  ["09", "Pricing comparison", window.SecPricingComparison],
  ["10", "Blog grid", window.SecBlogGrid],
  ["11", "Changelog", window.SecChangelog],
];
function Catalog() {
  return (
    <div>
      {CATALOG.map(([n, name, Comp]) => (
        <div key={n}>
          <Label n={n} name={name} />
          <Comp />
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Catalog />);
</script>
</body>
</html>
