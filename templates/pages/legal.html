<!-- @dsCard group="Pages" viewport="1280x900" name="Legal" subtitle="Document template for privacy, terms and cookie policies" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alfred — Legal</title>
<meta name="description" content="Legal document template for Alfred — the structure behind the privacy, terms and cookie policies published by E902 AI Labs Private Limited." />
<link rel="icon" href="../../assets/logos/alfred-favicon-white.svg" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-page); }
  .legal-doc { max-width: 760px; margin: 0 auto; padding: 72px 40px 96px; }
  .legal-eyebrow { font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--fw-bold);
    letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--orange-400); }
  .legal-title { font-family: var(--font-sans); font-weight: 400; font-size: 44px; line-height: 1.1;
    letter-spacing: -0.02em; color: var(--text-primary); margin: 16px 0 0; }
  .legal-updated { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-muted); margin: 14px 0 0; }
  .legal-toc { margin: 40px 0 0; padding: 24px 28px; background: var(--surface-card);
    border: 1px solid var(--border-subtle); border-radius: var(--radius-2xl); }
  .legal-toc ol { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .legal-toc a { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-link); text-decoration: none; }
  .legal-section { margin-top: 56px; padding-top: 40px; border-top: 1px solid var(--border-subtle); }
  .legal-marker { font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--fw-bold);
    letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--periwinkle-400); }
  .legal-section h2 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--text-xl);
    letter-spacing: -0.01em; color: var(--text-primary); margin: 10px 0 0; }
  .legal-section p { font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-secondary);
    line-height: var(--lh-relaxed); margin: 12px 0 0; }
  .legal-section a { color: var(--text-link); font-weight: var(--fw-bold); text-decoration: none; }
</style>
</head>
<body>
<!--
  HOW TO INSTANTIATE THIS TEMPLATE
  Copy this file to privacy.html / terms.html / cookies.html and:
  1. Set DOC.title to the footer's Legal-column name: "Privacy Policy", "Terms & Conditions" or "Cookies".
  2. Set DOC.updated to the real publication date (e.g. "1 July 2026") — bump it on every revision.
  3. Replace each section's placeholder <p> with the reviewed legal copy, keeping the same six-part
     structure (scope · data handling · subprocessors · retention · rights · contact) for privacy;
     for terms or cookies, rename/re-order SECTIONS to match that document's outline — the TOC
     renders from the same array, so it stays in sync automatically.
  4. Keep the entity name (E902 AI Labs Private Limited) and contact (hello@seekalfred.ai) verbatim.
  5. Update <title> and <meta name="description"> to match the instantiated document.
-->
<div id="root"></div>
<script type="text/babel" src="../../ui_kits/website/SiteTop.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/SiteBottom.jsx"></script>
<script type="text/babel">
const DOC = {
  title: "[Document title]",
  updated: "[Last updated date]",
};

/* Six-part structural skeleton. Each body explains what the section must contain —
   replace with reviewed legal copy when instantiating. */
const SECTIONS = [
  { id: "scope", marker: "[Section 01 · Scope]", title: "1. Scope", body: (
    <p>[SECTION] State what this document covers — the seekalfred.ai website, the Alfred product and its APIs — who it applies to (visitors, workspace users, customers), and the legal entity responsible: E902 AI Labs Private Limited. Note which other documents apply alongside it.</p>
  ) },
  { id: "data-handling", marker: "[Section 02 · Data handling]", title: "2. Data handling", body: (
    <p>[SECTION] Describe the categories of data collected and why: account details, data read from connected systems (read-only scopes by default; write-back is opt-in and approval-gated), and product usage data. State that customer data is logically isolated and never trains shared models.</p>
  ) },
  { id: "subprocessors", marker: "[Section 03 · Subprocessors]", title: "3. Subprocessors", body: (
    <p>[SECTION] List the third-party subprocessors that help operate Alfred — hosting, model providers, support and billing tooling — what each one receives, the safeguards in place, and where the always-current subprocessor list is maintained.</p>
  ) },
  { id: "retention", marker: "[Section 04 · Retention]", title: "4. Retention", body: (
    <p>[SECTION] State how long each data class is retained, what happens when a workspace is closed, and the deletion timelines. Confirm that customers can export or delete their data whenever they ask.</p>
  ) },
  { id: "rights", marker: "[Section 05 · Rights]", title: "5. Your rights", body: (
    <p>[SECTION] Explain the rights available to users — access, correction, export, deletion, and objection — how to exercise each one, the verification steps involved, and the response timelines E902 AI Labs commits to.</p>
  ) },
  { id: "contact", marker: "[Section 06 · Contact]", title: "6. Contact", body: (
    <p>[SECTION] Provide the contact for questions, requests and escalations — <a href="mailto:hello@seekalfred.ai">hello@seekalfred.ai</a> — along with the registered address of E902 AI Labs Private Limited and how complaints are handled.</p>
  ) },
];

function LegalDoc() {
  return (
    <main className="legal-doc">
      <span className="legal-eyebrow">Legal</span>
      <h1 className="legal-title">{DOC.title}</h1>
      <div className="legal-updated">Last updated: {DOC.updated}</div>
      <nav className="legal-toc" aria-label="Contents">
        <span className="legal-eyebrow" style={{ color: "var(--text-muted)" }}>Contents</span>
        <ol>
          {SECTIONS.map((s) => (
            <li key={s.id}><a href={`#${s.id}`}>{s.title}</a></li>
          ))}
        </ol>
      </nav>
      {SECTIONS.map((s) => (
        <section key={s.id} id={s.id} className="legal-section">
          <span className="legal-marker">{s.marker}</span>
          <h2>{s.title}</h2>
          {s.body}
        </section>
      ))}
    </main>
  );
}

function Page() {
  return (
    <>
      <window.SiteNav />
      <LegalDoc />
      <window.SiteFooter />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
