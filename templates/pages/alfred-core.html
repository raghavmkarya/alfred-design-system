<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alfred Core — The memory layer underneath every decision</title>
<meta name="description" content="Alfred Core is the compounding memory layer underneath every Alfred module. It remembers every signal, decision and outcome across your organisation — so no briefing ever starts from zero." />
<link rel="icon" href="../../assets/logos/alfred-favicon-white.svg" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-page); }
  /* Page-local layout override: the values grid defaults to 3 columns;
     the four Alfred Core pillars sit on one row of 4. */
  .pillars4 section > div > div:last-child { grid-template-columns: repeat(4, 1fr) !important; }
</style>
</head>
<body>
<div id="root"></div>
<!-- SectionsA exposes the shared Container/Eyebrow/H2 helpers that SectionsE and SectionsF reuse. -->
<script type="text/babel" src="../sections/SectionsA.jsx"></script>
<script type="text/babel" src="../sections/SectionsD.jsx"></script>
<script type="text/babel" src="../sections/SectionsE.jsx"></script>
<script type="text/babel" src="../sections/SectionsF.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/SiteTop.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/SiteBottom.jsx"></script>
<script type="text/babel">
/* Gradient text — the single gradient element in the hero view. */
const gradientText = {
  background: "var(--gradient-brand)",
  WebkitBackgroundClip: "text",
  backgroundClip: "text",
  color: "transparent",
};

const PILLARS = [
  {
    icon: "web-stack-connected",
    title: "Cross-Function",
    line: "One memory across marketing, sales and finance — a spend change and a pipeline dip read as one story, not two dashboards.",
  },
  {
    icon: "web-clarity",
    title: "Root Cause",
    color: "var(--periwinkle-400)",
    line: "Alfred traces what changed back to why it changed, and every recommendation carries its source.",
  },
  {
    icon: "bookmark",
    title: "Institutional Knowledge",
    line: "Owners, targets, seasonality and past calls live in the memory — not in someone's head or a slide from last quarter.",
  },
  {
    icon: "trend-up",
    title: "Compounding Intelligence",
    line: "Every outcome Alfred remembers makes the next briefing sharper. The longer it runs, the smarter it gets.",
  },
];

function Page() {
  return (
    <>
      <window.SiteNav />
      <window.SecHero
        eyebrow="Alfred Core"
        title={<>The <span style={gradientText}>memory layer</span> underneath every decision</>}
        sub="Alfred Core remembers every signal, decision and outcome across your organisation — so no briefing ever starts from zero."
        primaryCta="get started"
        secondaryCta="How it works"
      />
      <window.SecStatement
        eyebrow="Why it exists"
        statement="Not another dashboard, not another chatbot, not another analytics tool."
        body="Leaders don't lack data — they lack decisions. Decision intelligence sits between your data and your decisions: it detects what changed, explains why, and recommends what to do next. Alfred Core is the memory that makes that loop possible."
      />
      <window.SecStatement
        eyebrow="What it does"
        statement="One compounding memory, running the Learn → Nudge → Recommend → Act loop."
        body="Alfred Core connects the stack you already run, learns how your organisation actually works, nudges you when something changes, recommends what to do next — and remembers the outcome of every call, so each module starts smarter than the last."
      />
      <window.SecStackDiagram />
      <window.SecTimeline />
      <div className="pillars4">
        <window.SecValuesGrid title="The four pillars of Alfred Core" values={PILLARS} />
      </div>
      <window.SecClosingCTA />
      <window.SiteFooter />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>

</html>
