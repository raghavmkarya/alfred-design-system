name: verify

# Gates every PR (and pushes to main) on the design system's six verifiers, and
# fails if the committed bundle is stale. Locks in what the verifiers guarantee:
# component render health, ARIA/keyboard contracts, craft rules, type contracts,
# and WCAG-AA color contrast across all three themes.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # typescript + @types/react — the tsc --noEmit pass inside verify-types
      - name: Install type-check deps
        run: npm ci

      # The verifiers test the committed _ds_bundle.js, so a stale bundle would
      # let unshipped source changes pass silently. Rebuild and require no diff.
      # (build-bundle.mjs is deterministic — a clean rebuild yields no change.)
      - name: Bundle is committed-fresh
        run: |
          node scripts/build-bundle.mjs
          if ! git diff --quiet -- _ds_bundle.js _ds_manifest.json; then
            echo "::error::_ds_bundle.js / _ds_manifest.json are stale — run 'node scripts/build-bundle.mjs' and commit the result."
            git --no-pager diff --stat -- _ds_bundle.js _ds_manifest.json
            exit 1
          fi

      - name: verify-render (kit render health)
        run: node scripts/verify-render.mjs
      - name: verify-components (all 113 render clean)
        run: node scripts/verify-components.mjs
      - name: verify-a11y (ARIA/keyboard contracts)
        run: node scripts/verify-a11y.mjs
      - name: verify-craft (motion/anti-slop craft rules)
        run: node scripts/verify-craft.mjs
      - name: verify-types (.d.ts present + declared + tsc --noEmit)
        run: node scripts/verify-types.mjs
      - name: verify-contrast (WCAG AA over color tokens, all themes)
        run: node scripts/verify-contrast.mjs

  # OS-independent interaction/behaviour tests (Playwright). These assert DOM
  # state, not pixels, so a bare runner + a Chromium install is enough.
  interaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Playwright interaction tests
        run: npx playwright test --project=interaction

  # Tri-theme visual regression (light / app-dark / marketing-dark) — the harness
  # that caught the marketing-dark Banner bug, now a standing gate. Runs in the
  # version-pinned Playwright container so pixels match the committed *-linux.png
  # baselines. Seed / re-bless those baselines with the update-visual-baselines
  # workflow (it regenerates them in this same container). On a diff, the report
  # is uploaded so the intended-vs-actual can be eyeballed before re-blessing.
  visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - name: Playwright visual regression
        run: npx playwright test --project=visual
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
